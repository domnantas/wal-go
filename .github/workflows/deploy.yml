name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  STAGE: >-
    ${{ github.event_name == 'pull_request'
      && format('pr-{0}', github.event.number)
      || (github.ref == 'refs/heads/main' && 'prod' || github.ref_name) }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy
        working-directory: packages/infra
        run: pnpm exec alchemy deploy --yes --stage ${{ env.STAGE }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          PULL_REQUEST: ${{ github.event.number }}

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Safety Check
        run: |
          # Only ever destroy preview stages. Anything that is not pr-<number>
          # (prod, a branch name, an empty/garbage value) aborts the job.
          case "${{ env.STAGE }}" in
            pr-[0-9]*) echo "Destroying preview stage ${{ env.STAGE }}" ;;
            *) echo "ERROR: refusing to destroy non-preview stage '${{ env.STAGE }}'"; exit 1 ;;
          esac

      - name: Destroy Preview
        working-directory: packages/infra
        # Retry transient failures (PlanetScale/Cloudflare API blips). destroy is
        # idempotent, so re-running continues from where it left off. The db is
        # RemovalPolicy.retain() in alchemy.run.ts, so this only removes the
        # preview branch + worker — never the shared production database.
        run: |
          for attempt in 1 2 3; do
            echo "::group::alchemy destroy (attempt $attempt)"
            if pnpm exec alchemy destroy --yes --stage ${{ env.STAGE }}; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "destroy attempt $attempt failed"; sleep $((attempt * 10))
          done
          echo "destroy failed after 3 attempts"; exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}

name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Set stage
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "STAGE=prod" >> $GITHUB_ENV
          else
            echo "STAGE=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          fi

      - name: Verify Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

          check_cloudflare_access() {
            local label="$1"
            local url="$2"
            local allowed_statuses="$3"
            local body
            body="$(mktemp)"
            local status
            status="$(
              curl --silent --show-error \
                --output "$body" \
                --write-out "%{http_code}" \
                --request GET \
                --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                --header "Content-Type: application/json" \
                "$url"
            )"

            if [[ " ${allowed_statuses} " != *" ${status} "* ]]; then
              echo "${label} failed with HTTP ${status}"
              cat "$body"
              rm -f "$body"
              exit 1
            fi

            rm -f "$body"
          }

          echo "Verifying Cloudflare API token..."
          check_cloudflare_access \
            "Cloudflare API token verification" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            "200"

          echo "Verifying Cloudflare account access..."
          check_cloudflare_access \
            "Cloudflare account access" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}" \
            "200"

          echo "Verifying Cloudflare Workers Scripts access..."
          check_cloudflare_access \
            "Cloudflare Workers Scripts access" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/alchemy-state-store/script-settings" \
            "200 404"

          echo "Verifying Cloudflare Hyperdrive access..."
          check_cloudflare_access \
            "Cloudflare Hyperdrive access" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/hyperdrive/configs" \
            "200"

          echo "Verifying Cloudflare Secrets Store access..."
          check_cloudflare_access \
            "Cloudflare Secrets Store access" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/secrets_store/stores" \
            "200"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify PlanetScale credentials
        run: |
          test -n "$PLANETSCALE_API_TOKEN_ID"
          test -n "$PLANETSCALE_API_TOKEN"
          test -n "$PLANETSCALE_ORGANIZATION"

          check_planetscale_access() {
            local label="$1"
            local url="$2"
            local allowed_statuses="$3"
            local body
            body="$(mktemp)"
            local status
            status="$(
              curl --silent --show-error \
                --output "$body" \
                --write-out "%{http_code}" \
                --request GET \
                --header "Authorization: ${PLANETSCALE_API_TOKEN_ID}:${PLANETSCALE_API_TOKEN}" \
                --header "Content-Type: application/json" \
                "$url"
            )"

            if [[ " ${allowed_statuses} " != *" ${status} "* ]]; then
              echo "${label} failed with HTTP ${status}"
              cat "$body"
              rm -f "$body"
              exit 1
            fi

            rm -f "$body"
          }

          echo "Verifying PlanetScale organization access..."
          check_planetscale_access \
            "PlanetScale organization access" \
            "https://api.planetscale.com/v1/organizations/${PLANETSCALE_ORGANIZATION}" \
            "200"

          echo "Verifying PlanetScale database access..."
          check_planetscale_access \
            "PlanetScale database access" \
            "https://api.planetscale.com/v1/organizations/${PLANETSCALE_ORGANIZATION}/databases/wal-go" \
            "200 404"

          echo "Verifying PlanetScale branch access..."
          check_planetscale_access \
            "PlanetScale main branch access" \
            "https://api.planetscale.com/v1/organizations/${PLANETSCALE_ORGANIZATION}/databases/wal-go/branches/main" \
            "200 404"

          echo "Verifying PlanetScale role access..."
          check_planetscale_access \
            "PlanetScale main branch role access" \
            "https://api.planetscale.com/v1/organizations/${PLANETSCALE_ORGANIZATION}/databases/wal-go/branches/main/roles" \
            "200 404"
        env:
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}

      - name: Deploy
        working-directory: packages/infra
        run: pnpm run deploy -- --stage ${{ env.STAGE }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}

  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Destroy preview
        working-directory: packages/infra
        run: pnpm run destroy -- --stage pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
